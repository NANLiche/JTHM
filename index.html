<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 모바일 화면 비율 고정 (매우 중요) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>전투휴무 관리 (모바일)</title>
    <!-- FullCalendar CSS -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 상단 헤더 -->
    <header class="top-header">
        <h1>📡 통신반 휴무관리</h1>
    </header>

    <!-- 메인 컨텐츠 영역 (탭에 따라 바뀜) -->
    <main class="content-area">
        
        <!-- 탭 1: 캘린더 -->
        <div id="tab-calendar" class="tab-content active">
            <div id="calendar"></div>
        </div>

        <!-- 탭 2: 인원 현황 -->
        <div id="tab-status" class="tab-content">
            <div class="card">
                <h2>👥 마일리지 현황</h2>
                <p class="sub-text">총 인원: <span id="total-personnel">5</span>명 (최소 출근 3명)</p>
                <ul id="personnel-list" class="status-list">
                    <!-- JS 렌더링 -->
                </ul>
                <button id="reset-btn" class="btn btn-danger mt-20">데이터 초기화</button>
            </div>
        </div>

        <!-- 탭 3: 당직 등록 -->
        <div id="tab-duty" class="tab-content">
            <div class="card">
                <h2>🛡️ 당직 등록</h2>
                <form id="duty-form">
                    <div class="form-group">
                        <label>날짜</label>
                        <input type="date" id="duty-date" required>
                    </div>
                    <div class="form-group">
                        <label>당직자</label>
                        <select id="duty-person" required></select>
                    </div>
                    <div class="form-group">
                        <label>근무 종류</label>
                        <select id="duty-type" required>
                            <option value="day">주간 당직 (토,일)</option>
                            <option value="night">야간 당직 (평일,주말)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">당직 추가하기</button>
                </form>
            </div>
        </div>

        <!-- 탭 4: 휴무 신청 -->
        <div id="tab-leave" class="tab-content">
            <div class="card">
                <h2>🌴 전투휴무 신청</h2>
                <form id="leave-form">
                    <div class="form-group">
                        <label>날짜</label>
                        <input type="date" id="leave-date" required>
                    </div>
                    <div class="form-group">
                        <label>신청자</label>
                        <select id="leave-person" required></select>
                    </div>
                    <div class="form-group">
                        <label>휴무 종류</label>
                        <select id="leave-type" required>
                            <option value="full">종일 (마일리지 1 차감)</option>
                            <option value="am">오전 반투 (0.5 차감)</option>
                            <option value="pm">오후 반투 (0.5 차감)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success">휴무 신청하기</button>
                </form>
            </div>
        </div>

    </main>

    <!-- 하단 네비게이션 탭 -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('tab-calendar', this)">
            <span class="icon">📅</span>
            <span>캘린더</span>
        </div>
        <div class="nav-item" onclick="switchTab('tab-status', this)">
            <span class="icon">👥</span>
            <span>현황</span>
        </div>
        <div class="nav-item" onclick="switchTab('tab-duty', this)">
            <span class="icon">🛡️</span>
            <span>당직</span>
        </div>
        <div class="nav-item" onclick="switchTab('tab-leave', this)">
            <span class="icon">🌴</span>
            <span>휴무</span>
        </div>
    </nav>

    <!-- FullCalendar JS -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
